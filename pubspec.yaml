name: safescreen
description: SmartScreen – Smart Parental Control
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  installed_apps: ^2.0.0
  fl_chart: ^0.70.0
  shared_preferences: ^2.2.0
